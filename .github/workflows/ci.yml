name: CI Pipeline

on:
push:
branches: [main, dev]
pull_request:
branches: [main]
workflow_dispatch:

jobs:

lint:
name: Lint & Format Check
runs-on: ubuntu-latest

```
steps:
  - uses: actions/checkout@v4

  - uses: actions/setup-python@v5
    with:
      python-version: "3.11"   # more stable than 3.13
      cache: "pip"

  - name: Install linting tools
    run: pip install flake8 "black[jupyter]" isort

  # Black check
  - name: Black Check
    run: black --check . --exclude notebooks

  # isort with black profile
  - name: isort Check
    run: isort --profile black --check-only . --skip notebooks

  # Flake8 (clean + controlled)
  - name: Flake8 Check
    run: |
      flake8 . \
      --max-line-length=100 \
      --exclude=.venv,__pycache__,notebooks \
      --ignore=E203,W503
```

test:
name: Run Tests
runs-on: ubuntu-latest
needs: lint

```
steps:
  - uses: actions/checkout@v4

  - uses: actions/setup-python@v5
    with:
      python-version: "3.11"
      cache: "pip"

  - name: Install dependencies (CI-safe)
    run: |
      if [ -f requirements-ci.txt ]; then
        pip install -r requirements-ci.txt
      else
        echo "requirements-ci.txt not found, installing minimal deps"
        pip install numpy pandas scikit-learn
      fi
      pip install pytest pytest-cov

  - name: Run tests (if available)
    run: |
      if [ -d "tests" ]; then
        pytest tests/ --cov=src --cov-report=term-missing -v
      else
        echo "No tests folder found, skipping tests."
      fi
```

build-check:
name: Import & Build Check
runs-on: ubuntu-latest
needs: lint

```
steps:
  - uses: actions/checkout@v4

  - uses: actions/setup-python@v5
    with:
      python-version: "3.11"
      cache: "pip"

  - name: Install dependencies (CI-safe)
    run: |
      if [ -f requirements-ci.txt ]; then
        pip install -r requirements-ci.txt
      else
        pip install numpy pandas scikit-learn
      fi

  - name: Verify all modules import cleanly
    run: |
      python - <<EOF
      import pkgutil
      import importlib

      for module in pkgutil.walk_packages(["src"]):
          try:
              importlib.import_module(module.name)
          except Exception as e:
              print(f"Failed to import {module.name}: {e}")
              raise
      print("All modules imported successfully.")
      EOF
```
